version: "3.9"

# Worker template
x-worker-base: &worker-base
  build:
    context: ./backend
    dockerfile: worker/Dockerfile
  restart: unless-stopped
  networks:
    - app-net

services:

  # Backend Orchestrator to disperse tasks to workers and collect results
  orchestrator:
    build:
      context: ./backend
      dockerfile: orchestrator/Dockerfile
    ports:
      - "8000:8000"
    environment:
      WORKER_URLS: >-
        http://worker1:8001,http://worker2:8001,http://worker3:8001,
        http://worker4:8001,http://worker5:8001,http://worker6:8001,
        http://worker7:8001,http://worker8:8001
    depends_on:
      - worker1
      - worker2
      - worker3
      - worker4
      - worker5
      - worker6
      - worker7
      - worker8
    restart: unless-stopped
    networks:
      - app-net

  # Worker containers , each with unique worker id
  worker1:
    <<: *worker-base
    environment:
      WORKER_ID: worker1

  worker2:
    <<: *worker-base
    environment:
      WORKER_ID: worker2

  worker3:
    <<: *worker-base
    environment:
      WORKER_ID: worker3

  worker4:
    <<: *worker-base
    environment:
      WORKER_ID: worker4

  worker5:
    <<: *worker-base
    environment:
      WORKER_ID: worker5

  worker6:
    <<: *worker-base
    environment:
      WORKER_ID: worker6

  worker7:
    <<: *worker-base
    environment:
      WORKER_ID: worker7

  worker8:
    <<: *worker-base
    environment:
      WORKER_ID: worker8

  # React frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - orchestrator
    restart: unless-stopped
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
