      COMPUTER_NAME: ${COMPUTER_NAME:-lan-worker-host}
      WORKER_ID: ${COMPUTER_NAME:-lan-worker-host}-worker6
      WORKER_PUBLIC_URL: http://${WORKER_HOST_IP}:8106

  worker7:
    <<: *worker-base
    ports:
      - "8107:8001"
    environment:
      ORCHESTRATOR_URL: ${ORCHESTRATOR_URL}
      COMPUTER_NAME: ${COMPUTER_NAME:-lan-worker-host}
      WORKER_ID: ${COMPUTER_NAME:-lan-worker-host}-worker7
      WORKER_PUBLIC_URL: http://${WORKER_HOST_IP}:8107

  worker8:
    <<: *worker-base
    ports:
      - "8108:8001"
    environment:
      ORCHESTRATOR_URL: ${ORCHESTRATOR_URL}
      COMPUTER_NAME: ${COMPUTER_NAME:-lan-worker-host}
      WORKER_ID: ${COMPUTER_NAME:-lan-worker-host}-worker8
      WORKER_PUBLIC_URL: http://${WORKER_HOST_IP}:8108

networks:
  app-net:
    driver: bridge
